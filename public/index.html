<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Express Server</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            background: #0b1220;
            color: #e5e7eb;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .wrapper {
            width: 100%;
            padding: 40px;
        }

        h1 {
            font-size: 60px;
            letter-spacing: 2px;
            margin-bottom: 20px;
            color: #38bdf8;
        }

        p {
            font-size: 18px;
            max-width: 700px;
            margin: 0 auto;
            color: #9ca3af;
            line-height: 1.7;
        }

        .status {
            margin-top: 30px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            border-radius: 999px;
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.4);
            color: #22c55e;
            font-weight: 600;
            font-size: 14px;
        }

        .dot {
            width: 10px;
            height: 10px;
            background: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 10px #22c55e;
        }

        .footer {
            margin-top: 50px;
            font-size: 13px;
            color: #6b7280;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 36px;
            }

            p {
                font-size: 16px;
                padding: 0 10px;
            }
        }
    </style>
</head>

<body>

    <div class="wrapper">
        <h1>Express Server Running</h1>

        <p>
            The backend server is up and running successfully. All systems are active,
            routes are responding properly, and static files are being served without any issues.
            You can now start building and testing your APIs.
        </p>

        <div class="status">
            <span class="dot"></span>
            LIVE SERVER ACTIVE
        </div>

        <div class="footer">
            Node.js • Express • Backend API Ready
        </div>
    </div>

</body>

</html>
